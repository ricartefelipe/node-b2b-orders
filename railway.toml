[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/api.Dockerfile"

[deploy]
healthcheckPath = "/v1/healthz"
# Migrations + Nest bootstrap podem exceder 3m no staging; Railway falhava antes do listen.
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
